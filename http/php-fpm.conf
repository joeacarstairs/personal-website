[joeac.net]
user = nginx
group = nginx
listen = /run/php/php8.1-fpm-joeac.net-http.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

php_admin_value[disable_functions] = exec,passthru,shell_exec,system
php_admin_flag[allow_url_fopen] = off

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
